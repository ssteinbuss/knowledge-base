
site_name: Knowledge Base
site_url: https://ssteinbuss.github.io/knowledge-base/
repo_url: https://github.com/ssteinbuss/knowledge-base
repo_name: knowledge-base
theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/IDSA-logo_2.png
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom
      # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
extra_css:
  - assets/styles.css
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - literate-nav:
      nav_file: SUMMARY.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - def_list
extra:
  generator: false
  social:
    - icon: fontawesome/brands/linkedin 
      link: www.linkedin.com/company/international-data-spaces-association/
copyright: Copyright &copy; 2016 - 2026 IDSA e.V. All rights reserved.
